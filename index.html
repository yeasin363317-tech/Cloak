<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Cloak — talk, then vanish</title>
<meta name="theme-color" content="#0A0A0F">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --void:#0A0A0F;
    --panel:#131319;
    --panel-2:#1B1B24;
    --line:#2A2A36;
    --ink:#E9E7EE;
    --ink-dim:#8B8A9A;
    --signal:#E0A458;
    --signal-dim:#7A5A2E;
    --mist:#5B5B78;
    --danger:#C4574B;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:radial-gradient(ellipse at top, #14141C 0%, var(--void) 60%);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    min-height:100dvh;
    display:flex; flex-direction:column;
    overflow-x:hidden;
  }
  .fog{
    position:fixed; inset:0; pointer-events:none; z-index:0; opacity:.5;
    background:
      radial-gradient(600px 300px at 15% -5%, rgba(224,164,88,.06), transparent 60%),
      radial-gradient(500px 260px at 90% 10%, rgba(91,91,120,.10), transparent 60%);
  }
  .screen{ position:relative; z-index:1; flex:1; display:flex; flex-direction:column; }
  .hidden{ display:none !important; }

  /* ---------- Landing ---------- */
  #landing{ align-items:center; justify-content:center; padding:32px 20px; text-align:center; }
  .brand{ display:flex; flex-direction:column; align-items:center; gap:6px; margin-bottom:44px; }
  .brand-mark{
    width:52px; height:52px; border-radius:50%;
    background:conic-gradient(from 210deg, var(--signal), var(--mist), transparent 70%);
    filter:blur(.3px);
    box-shadow:0 0 40px rgba(224,164,88,.25);
    animation:drift 8s ease-in-out infinite;
  }
  @keyframes drift{ 0%,100%{transform:scale(1) rotate(0deg);} 50%{transform:scale(1.08) rotate(8deg);} }
  h1.wordmark{ font-family:'Fraunces',serif; font-weight:600; font-size:2.1rem; letter-spacing:.01em; }
  .tagline{ color:var(--ink-dim); font-size:.92rem; margin-top:4px; letter-spacing:.02em; }

  .card{
    width:100%; max-width:380px;
    background:linear-gradient(180deg, var(--panel), var(--panel-2));
    border:1px solid var(--line);
    border-radius:18px;
    padding:26px;
    box-shadow:0 20px 60px rgba(0,0,0,.4);
  }
  label{ display:block; text-align:left; font-size:.78rem; color:var(--ink-dim); margin-bottom:7px; letter-spacing:.03em; text-transform:uppercase; }
  input[type=text]{
    width:100%; background:#0E0E14; border:1px solid var(--line); color:var(--ink);
    border-radius:10px; padding:13px 14px; font-size:1rem; font-family:'Inter',sans-serif;
    margin-bottom:16px; outline:none; transition:border-color .15s;
  }
  input[type=text]:focus{ border-color:var(--signal-dim); }
  input.code-input{ font-family:'JetBrains Mono',monospace; letter-spacing:.35em; text-transform:uppercase; text-align:center; font-size:1.15rem; }

  .btn{
    width:100%; padding:14px; border-radius:10px; border:none; cursor:pointer;
    font-family:'Inter',sans-serif; font-weight:600; font-size:.95rem; letter-spacing:.01em;
    transition:transform .1s, opacity .15s;
  }
  .btn:active{ transform:scale(.98); }
  .btn-primary{ background:var(--signal); color:#1A1408; }
  .btn-primary:hover{ opacity:.92; }
  .btn-ghost{ background:transparent; color:var(--ink-dim); border:1px solid var(--line); margin-top:10px; }
  .btn-ghost:hover{ color:var(--ink); border-color:var(--mist); }
  .btn-danger{ background:transparent; color:var(--danger); border:1px solid rgba(196,87,75,.4); }

  .divider{ display:flex; align-items:center; gap:12px; margin:22px 0; color:var(--ink-dim); font-size:.75rem; letter-spacing:.08em; }
  .divider::before,.divider::after{ content:''; flex:1; height:1px; background:var(--line); }

  .error-text{ color:var(--danger); font-size:.82rem; margin-top:-8px; margin-bottom:14px; text-align:left; min-height:1em; }

  /* ---------- Chat ---------- */
  #chat{ display:flex; flex-direction:column; height:100dvh; }
  .chat-header{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 18px; border-bottom:1px solid var(--line);
    background:rgba(19,19,25,.7); backdrop-filter:blur(10px);
  }
  .room-info{ display:flex; align-items:center; gap:10px; }
  .room-code-pill{
    font-family:'JetBrains Mono',monospace; letter-spacing:.15em; font-size:.85rem;
    background:#0E0E14; border:1px solid var(--line); padding:6px 12px; border-radius:20px; color:var(--signal);
  }
  .member-count{ font-size:.78rem; color:var(--ink-dim); }
  .header-actions{ display:flex; gap:8px; }
  .icon-btn{
    background:transparent; border:1px solid var(--line); color:var(--ink-dim);
    border-radius:8px; padding:7px 10px; font-size:.75rem; cursor:pointer; font-family:'Inter',sans-serif;
  }
  .icon-btn:hover{ color:var(--ink); border-color:var(--mist); }

  .messages{ flex:1; overflow-y:auto; padding:20px 16px; display:flex; flex-direction:column; gap:10px; }
  .msg{ max-width:78%; padding:10px 14px; border-radius:14px; font-size:.92rem; line-height:1.4; word-wrap:break-word; animation:rise .25s ease; }
  @keyframes rise{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }
  .msg.mine{ align-self:flex-end; background:linear-gradient(135deg, var(--signal-dim), #4A3A1E); color:#F4E9D8; border-bottom-right-radius:4px; }
  .msg.theirs{ align-self:flex-start; background:var(--panel-2); border:1px solid var(--line); border-bottom-left-radius:4px; }
  .msg .sender{ font-size:.68rem; color:var(--ink-dim); margin-bottom:3px; letter-spacing:.03em; }
  .msg.system{ align-self:center; color:var(--ink-dim); font-size:.78rem; background:none; padding:4px; }

  .composer{ display:flex; gap:10px; padding:14px 16px; border-top:1px solid var(--line); background:rgba(19,19,25,.7); }
  .composer input{ flex:1; background:#0E0E14; border:1px solid var(--line); color:var(--ink); border-radius:24px; padding:12px 18px; font-size:.95rem; outline:none; }
  .composer input:focus{ border-color:var(--signal-dim); }
  .send-btn{ background:var(--signal); border:none; color:#1A1408; border-radius:50%; width:44px; height:44px; font-size:1.1rem; cursor:pointer; flex-shrink:0; }

  /* ---------- Modal ---------- */
  .modal-overlay{ position:fixed; inset:0; background:rgba(6,6,9,.7); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; z-index:50; padding:20px; }
  .modal{ background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:24px; max-width:340px; width:100%; text-align:center; }
  .modal h3{ font-family:'Fraunces',serif; font-weight:600; margin-bottom:10px; }
  .modal p{ color:var(--ink-dim); font-size:.88rem; margin-bottom:20px; line-height:1.5; }
  .modal-actions{ display:flex; gap:10px; }

  .dissolve{ animation:dissolveOut .8s ease forwards; }
  @keyframes dissolveOut{ to{ opacity:0; filter:blur(6px); transform:scale(.96); } }

  ::-webkit-scrollbar{ width:6px; }
  ::-webkit-scrollbar-thumb{ background:var(--line); border-radius:3px; }
</style>
</head>
<body>
<div class="fog"></div>

<!-- LANDING -->
<div id="landing" class="screen">
  <div class="brand">
    <div class="brand-mark"></div>
    <h1 class="wordmark">Cloak</h1>
    <p class="tagline">Talk freely. Nothing stays behind.</p>
  </div>

  <div class="card" id="start-card">
    <label for="name-input">Your name</label>
    <input type="text" id="name-input" placeholder="What should they call you?" maxlength="24">
    <p class="error-text" id="start-error"></p>
    <button class="btn btn-primary" id="btn-start-room">Start a private chat</button>
    <div class="divider">OR</div>
    <label for="join-code-input">Have a code?</label>
    <input type="text" id="join-code-input" class="code-input" placeholder="XXXXXX" maxlength="6">
    <button class="btn btn-ghost" id="btn-join-room">Join with code</button>
  </div>
</div>

<!-- CHAT -->
<div id="chat" class="screen hidden">
  <div class="chat-header">
    <div class="room-info">
      <span class="room-code-pill" id="room-code-display">------</span>
      <span class="member-count" id="member-count-display">1 / 2</span>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="btn-copy-code">Copy code</button>
      <button class="icon-btn" id="btn-add-people">+ Add</button>
      <button class="icon-btn" id="btn-leave" style="color:var(--danger); border-color:rgba(196,87,75,.4);">Close</button>
    </div>
  </div>
  <div class="messages" id="messages"></div>
  <div class="composer">
    <input type="text" id="message-input" placeholder="Say something..." maxlength="1000">
    <button class="send-btn" id="btn-send">➤</button>
  </div>
</div>

<script>
const SUPABASE_URL = "https://ljpwocnujkndrzixgjff.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxqcHdvY251amtuZHJ6aXhnamZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxOTg0NDMsImV4cCI6MjA5OTc3NDQ0M30.-mFGhzhBecmtwNF9prdBWOnhvUcClQzk-coaBm_T-as";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function getSessionId(){
  let id = localStorage.getItem('cloak_session_id');
  if(!id){ id = crypto.randomUUID(); localStorage.setItem('cloak_session_id', id); }
  return id;
}
const sessionId = getSessionId();
let displayName = localStorage.getItem('cloak_name') || '';
let room = null;
let msgChannel = null;
let roomChannel = null;
let memberChannel = null;
let pollTimer = null;
let lastSeenAt = null;
const seenMessageIds = new Set();

const $ = (id) => document.getElementById(id);
const landing = $('landing'), chat = $('chat');
const nameInput = $('name-input'), joinCodeInput = $('join-code-input'), startError = $('start-error');
const messagesEl = $('messages'), messageInput = $('message-input');

nameInput.value = displayName;

function escapeHtml(s){
  const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
}

function addMessageEl(sender, content, mine, isSystem=false, id=null){
  if(id){
    if(seenMessageIds.has(id)) return;
    seenMessageIds.add(id);
  }
  const div = document.createElement('div');
  div.className = isSystem ? 'msg system' : 'msg ' + (mine ? 'mine' : 'theirs');
  if(isSystem){
    div.textContent = content;
  } else {
    div.innerHTML = (mine ? '' : `<div class="sender">${escapeHtml(sender)}</div>`) + escapeHtml(content);
  }
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function updateHeader(){
  $('room-code-display').textContent = room.code;
  $('member-count-display').textContent = `${room.member_count} / ${room.max_members}`;
}

async function enterRoom(r, joinedFresh){
  room = r;
  landing.classList.add('hidden');
  chat.classList.remove('hidden');
  messagesEl.innerHTML = '';
  updateHeader();
  addMessageEl('', joinedFresh ? `You joined the conversation. Share code ${room.code} to invite someone.` : `Conversation started. Your code is ${room.code}.`, false, true);

  // realtime: new messages
  msgChannel = sb.channel('room-messages-' + room.id)
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'messages', filter:`room_id=eq.${room.id}` }, (payload) => {
      const m = payload.new;
      lastSeenAt = m.created_at;
      if(m.session_id === sessionId) return; // already rendered locally
      addMessageEl(m.sender_name, m.content, false, false, m.id);
    })
    .subscribe();

  // Polling safety net: catches any message realtime might have missed
  lastSeenAt = new Date().toISOString();
  pollTimer = setInterval(async () => {
    if(!room) return;
    const { data, error } = await sb
      .from('messages')
      .select('*')
      .eq('room_id', room.id)
      .order('created_at', { ascending: true });
    if(error || !data) return;
    for(const m of data){
      if(m.session_id === sessionId) { seenMessageIds.add(m.id); continue; }
      addMessageEl(m.sender_name, m.content, false, false, m.id);
    }
  }, 3000);

  // realtime: room closed (row deleted) or limit changed
  roomChannel = sb.channel('room-state-' + room.id)
    .on('postgres_changes', { event:'DELETE', schema:'public', table:'rooms', filter:`id=eq.${room.id}` }, () => {
      handleRoomClosed();
    })
    .on('postgres_changes', { event:'UPDATE', schema:'public', table:'rooms', filter:`id=eq.${room.id}` }, (payload) => {
      room.max_members = payload.new.max_members;
      room.member_count = payload.new.member_count;
      updateHeader();
    })
    .subscribe();

  // realtime: member joins
  memberChannel = sb.channel('room-members-' + room.id)
    .on('postgres_changes', { event:'INSERT', schema:'public', table:'room_members', filter:`room_id=eq.${room.id}` }, (payload) => {
      if(payload.new.session_id !== sessionId){
        addMessageEl('', `${payload.new.display_name} joined.`, false, true);
      }
    })
    .subscribe();
}

function handleRoomClosed(){
  chat.classList.add('dissolve');
  setTimeout(() => {
    chat.classList.remove('dissolve');
    cleanupChannels();
    chat.classList.add('hidden');
    landing.classList.remove('hidden');
    room = null;
  }, 750);
}

function cleanupChannels(){
  if(msgChannel) sb.removeChannel(msgChannel);
  if(roomChannel) sb.removeChannel(roomChannel);
  if(memberChannel) sb.removeChannel(memberChannel);
  if(pollTimer) clearInterval(pollTimer);
  msgChannel = roomChannel = memberChannel = pollTimer = null;
  seenMessageIds.clear();
}

$('btn-start-room').addEventListener('click', async () => {
  displayName = nameInput.value.trim();
  startError.textContent = '';
  if(!displayName){ startError.textContent = 'Enter a name first.'; return; }
  localStorage.setItem('cloak_name', displayName);
  $('btn-start-room').textContent = 'Opening...'; $('btn-start-room').disabled = true;
  const { data, error } = await sb.rpc('create_room', { p_creator_name: displayName, p_session_id: sessionId, p_max_members: 2 });
  $('btn-start-room').textContent = 'Start a private chat'; $('btn-start-room').disabled = false;
  if(error){ startError.textContent = 'Could not create a room. Try again.'; return; }
  enterRoom(data, false);
});

$('btn-join-room').addEventListener('click', async () => {
  displayName = nameInput.value.trim();
  const code = joinCodeInput.value.trim().toUpperCase();
  startError.textContent = '';
  if(!displayName){ startError.textContent = 'Enter a name first.'; return; }
  if(code.length !== 6){ startError.textContent = 'Codes are 6 characters.'; return; }
  localStorage.setItem('cloak_name', displayName);
  $('btn-join-room').textContent = 'Joining...'; $('btn-join-room').disabled = true;
  const { data, error } = await sb.rpc('join_room', { p_code: code, p_display_name: displayName, p_session_id: sessionId });
  $('btn-join-room').textContent = 'Join with code'; $('btn-join-room').disabled = false;
  if(error){
    startError.textContent = error.message.includes('ROOM_FULL') ? 'That room is full.' : 'No conversation found with that code.';
    return;
  }
  enterRoom(data, true);
});

async function sendMessage(){
  const text = messageInput.value.trim();
  if(!text || !room) return;
  messageInput.value = '';
  addMessageEl(displayName, text, true);
  const { data, error } = await sb.from('messages')
    .insert({ room_id: room.id, session_id: sessionId, sender_name: displayName, content: text })
    .select().single();
  if(error) addMessageEl('', 'Message failed to send.', false, true);
  else if(data) seenMessageIds.add(data.id);
}
$('btn-send').addEventListener('click', sendMessage);
messageInput.addEventListener('keydown', (e) => { if(e.key === 'Enter') sendMessage(); });

$('btn-copy-code').addEventListener('click', () => {
  navigator.clipboard.writeText(room.code);
  $('btn-copy-code').textContent = 'Copied!';
  setTimeout(() => $('btn-copy-code').textContent = 'Copy code', 1200);
});

$('btn-add-people').addEventListener('click', async () => {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h3>Raise the limit</h3>
      <p>Currently up to ${room.max_members} people. How many should be allowed in total?</p>
      <input type="text" id="limit-input" value="${room.max_members + 1}" style="width:100%;text-align:center;background:#0E0E14;border:1px solid var(--line);color:var(--ink);border-radius:10px;padding:12px;margin-bottom:16px;">
      <div class="modal-actions">
        <button class="btn btn-ghost" id="modal-cancel">Cancel</button>
        <button class="btn btn-primary" id="modal-confirm">Update</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  $('modal-cancel').onclick = () => overlay.remove();
  $('modal-confirm').onclick = async () => {
    const newLimit = parseInt($('limit-input').value, 10);
    if(newLimit && newLimit > 0){
      const { data, error } = await sb.rpc('update_member_limit', { p_room_id: room.id, p_new_limit: newLimit });
      if(!error){ room = data; updateHeader(); }
    }
    overlay.remove();
  };
});

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

$('btn-leave').addEventListener('click', () => {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h3>Close this conversation?</h3>
      <p>Everything — every message, every trace — disappears permanently for everyone. This can't be undone.</p>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="modal-cancel">Stay</button>
        <button class="btn btn-danger" id="modal-confirm">Erase it</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
  $('modal-cancel').onclick = () => overlay.remove();
  $('modal-confirm').onclick = async () => {
    overlay.remove();
    await sb.rpc('close_room', { p_room_id: room.id });
    handleRoomClosed();
  };
});
</script>
</body>
</html>
